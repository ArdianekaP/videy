<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Video Player</title>
    <script src="https://pl29180025.profitablecpmratenetwork.com/eb/39/25/eb39256009464b36f9b3fb16873b622c.js"></script>
    <style>
        body, html { background-color: #000; margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        /* Tampilan Thumbnail */
        .preview-box { 
            position: relative; width: 95%; max-width: 800px; aspect-ratio: 16/9; 
            border-radius: 12px; overflow: hidden; cursor: pointer; border: 1px solid #444; background: #111; 
        }
        .thumbnail { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .play-btn { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(229, 9, 20, 0.9); padding: 15px 35px; border-radius: 50px; 
            font-weight: bold; font-size: 20px; color: white; border: none; z-index: 10;
        }

        /* Container Video & Iklan Overlay */
        #video-wrapper { 
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 999;
        }
        
        /* Lapisan transparan di atas video untuk menangkap klik iklan */
        #ad-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; display: none;
        }
        
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="landing-page" class="preview-box" onclick="startVideo()">
        <img id="thumb-img" src="" class="thumbnail" onerror="this.src='https://via.placeholder.com/800x450/000/fff?text=Click+to+Play+Video'">
        <div class="play-btn">▶ PLAY VIDEO</div>
    </div>

    <div id="video-wrapper">
        <div id="ad-overlay" onclick="triggerAd()"></div>
        <iframe id="videy-frame" src="" allowfullscreen></iframe>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('id');
        const imgNum = urlParams.get('img') || '1'; 
        const adLink = "https://www.profitablecpmratenetwork.com/t2v3hgxv?key=173e8b7ec9146a87ccf987038e57f6f9";

        // Setup Thumbnail
        if(imgNum) {
            document.getElementById('thumb-img').src = "thumbs/" + imgNum + ".png";
        }

        function startVideo() {
            if(!videoId) return;

            // Load Video & Buka Iklan Pertama
            document.getElementById('videy-frame').src = "https://videy.co/v?id=" + videoId;
            window.open(adLink, "_blank");

            // Ganti Tampilan
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('video-wrapper').style.display = 'block';

            // Aktifkan overlay iklan setelah 5 detik video jalan
            // Supaya pas mau dipause atau digeser, kena iklan lagi
            setTimeout(() => {
                document.getElementById('ad-overlay').style.display = 'block';
            }, 5000); 
        }

        function triggerAd() {
            // Saat layar diklik setelah nonton, buka iklan lagi
            window.open(adLink, "_blank");
            
            // Sembunyikan overlay sebentar biar user bisa klik tombol di video
            document.getElementById('ad-overlay').style.display = 'none';
            
            // Munculkan lagi overlay-nya setelah 10 detik
            setTimeout(() => {
                document.getElementById('ad-overlay').style.display = 'block';
            }, 10000);
        }
    </script>
</body>
</html>
