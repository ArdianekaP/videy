<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    
    <script src="https://pl29180025.profitablecpmratenetwork.com/eb/39/25/eb39256009464b36f9b3fb16873b622c.js"></script>

    <style>
        body { background-color: #000; color: white; font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .player-container { position: relative; width: 95%; max-width: 640px; aspect-ratio: 16/9; background: #111; border-radius: 10px; border: 1px solid #333; cursor: pointer; display: flex; align-items: center; justify-content: center; background-image: url('https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?q=80&w=1000&auto=format&fit=crop'); background-size: cover; background-position: center; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); border-radius: 10px; }
        .play-button { position: relative; z-index: 2; width: 80px; height: 80px; background: rgba(229, 9, 20, 0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(229, 9, 20, 0.5); transition: 0.3s; }
        .play-button:hover { transform: scale(1.1); background: #ff0000; }
        .play-icon { width: 0; height: 0; border-top: 15px solid transparent; border-bottom: 15px solid transparent; border-left: 25px solid white; margin-left: 5px; }
        .loading-text { position: absolute; bottom: 20px; font-size: 14px; color: #aaa; z-index: 2; }
        #video-wrapper { display: none; width: 100%; height: 100vh; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="landing-page" class="player-container" onclick="startVideo()">
        <div class="overlay"></div>
        <div class="play-button">
            <div class="play-icon"></div>
        </div>
        <div class="loading-text">Video is ready to play. Click to start.</div>
    </div>

    <div id="video-wrapper">
        <iframe id="videy-frame" src="" allowfullscreen></iframe>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('id');

        function startVideo() {
            if(!videoId) {
                alert("Please provide a valid Video ID.");
                return;
            }
            
            // Masukkan link video asli
            document.getElementById('videy-frame').src = "https://videy.co/v?id=" + videoId;
            
            // Tukar tampilan
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('video-wrapper').style.display = 'block';
            
            // Buka Iklan Direct Link
            window.open("https://www.profitablecpmratenetwork.com/t2v3hgxv?key=173e8b7ec9146a87ccf987038e57f6f9", "_blank");
        }
    </script>
</body>
</html>
