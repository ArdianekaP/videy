<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Video Player</title>
    <script src="https://pl29180025.profitablecpmratenetwork.com/eb/39/25/eb39256009464b36f9b3fb16873b622c.js"></script>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .preview-box { position: relative; width: 95%; max-width: 640px; border-radius: 12px; overflow: hidden; cursor: pointer; border: 1px solid #444; background: #111; aspect-ratio: 16/9; }
        .thumbnail { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .play-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(229, 9, 20, 0.9); padding: 15px 30px; border-radius: 50px; font-weight: bold; font-size: 18px; color: white; border: none; z-index: 10; }
        #video-wrapper { display: none; width: 100%; height: 100vh; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="landing-page" class="preview-box" onclick="startVideo()">
        <img id="thumb-img" src="" class="thumbnail" onerror="this.src='https://via.placeholder.com/640x360/000/fff?text=Click+to+Play+Video'">
        <div class="play-btn">▶ PLAY VIDEO</div>
    </div>

    <div id="video-wrapper">
        <iframe id="videy-frame" src="" allowfullscreen></iframe>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('id');

        if(videoId) {
            // Kita coba pakai format bypass i0.wp.com (Proxy Jetpack)
            // Ini biasanya ampuh menembus blokir hotlink
            const rawUrl = "cdn.videy.co/" + videoId + ".jpg";
            document.getElementById('thumb-img').src = "https://i0.wp.com/" + rawUrl;
        }

        function startVideo() {
            if(!videoId) return;
            document.getElementById('videy-frame').src = "https://videy.co/v?id=" + videoId;
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('video-wrapper').style.display = 'block';
            window.open("https://www.profitablecpmratenetwork.com/t2v3hgxv?key=173e8b7ec9146a87ccf987038e57f6f9", "_blank");
        }
    </script>
</body>
</html>
