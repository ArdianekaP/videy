<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    
    <script src="https://pl29180025.profitablecpmratenetwork.com/eb/39/25/eb39256009464b36f9b3fb16873b622c.js"></script>

    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; overflow: hidden; }
        .preview-box { position: relative; width: 95%; max-width: 640px; border-radius: 15px; overflow: hidden; cursor: pointer; border: 2px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .thumbnail { width: 100%; height: auto; min-height: 250px; display: block; object-fit: cover; opacity: 0.6; transition: 0.3s; }
        .preview-box:hover .thumbnail { opacity: 0.8; }
        .play-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #e50914; color: white; padding: 15px 30px; border-radius: 50px; font-weight: bold; font-size: 18px; box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4); }
        #video-wrapper { display: none; width: 100%; height: 100vh; background: black; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="landing-page" class="preview-box" onclick="startVideo()">
        <img id="thumb-img" src="https://via.placeholder.com/640x360/222/fff?text=Loading+Video..." class="thumbnail">
        <div class="play-btn">▶ PLAY VIDEO</div>
    </div>

    <div id="video-wrapper">
        <iframe id="videy-frame" src="" allowfullscreen></iframe>
    </div>

    <script>
        // 1. Ambil ID Video dari link (vi-dey.com/?id=XXXXX)
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('id');

        // 2. Pasang thumbnail otomatis dari server Videy
        if(videoId) {
            document.getElementById('thumb-img').src = "https://cdn.videy.co/" + videoId + ".jpg";
        } else {
            document.querySelector('.play-btn').innerHTML = "ID VIDEO TIDAK ADA";
        }

        function startVideo() {
            if(!videoId) {
                alert("Silakan masukkan ID Video di link!");
                return;
            }
            
            // Set sumber video
            document.getElementById('videy-frame').src = "https://videy.co/v?id=" + videoId;
            
            // Ganti tampilan ke player
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('video-wrapper').style.display = 'block';
            
            // 3. Iklan Direct Link (Akan terbuka di tab baru saat klik play)
            window.open("https://www.profitablecpmratenetwork.com/t2v3hgxv?key=173e8b7ec9146a87ccf987038e57f6f9", "_blank");
        }
    </script>
</body>
</html>
